[data.clickhouse]
candles_table = "bybit.candles"
transactions_table = "bybit.transactions"
timezone = "UTC"

[data.references]
btc_symbol = "BTCUSDT"
eth_symbol = "ETHUSDT"

[data.event_opener]
runup_lookback_bars = 12
min_runup_pct = 0.10
near_high_lookback_bars = 8
near_high_tol_pct = 0.0075
volume_ratio_lookback_bars = 20
min_volume_ratio = 2.0
max_episode_bars = 24
expiry_drawdown_pct = 0.03
cooldown_bars = 10

[data.resolver]
horizon_bars = 32
success_pullback_pct = 0.035
max_prepullback_squeeze_pct = 0.015
flat_max_abs_move_pct = 0.008
max_wait_bars_for_success = 8

[splits]
train_end = "2025-10-31"
val_end = "2026-01-15"
test_end = "2026-03-15"

[detector]
arm_score_min = 0.50
fire_score_floor = 0.35
turn_down_delta = 0.12

[detector.model]
iterations = 350
depth = 6
learning_rate = 0.05
l2_leaf_reg = 3.0
random_seed = 42

[detector.cv]
min_train_days = 120
fold_span_days = 21
max_folds = 4

[gate]
block_threshold = 0.90

[gate.model]
iterations = 250
depth = 5
learning_rate = 0.05
l2_leaf_reg = 3.0
random_seed = 42

[search.detector_policy]
arm_candidates = [0.40, 0.45, 0.50, 0.55, 0.60, 0.65]
fire_candidates = [0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55]
turn_candidates = [0.015, 0.03, 0.06, 0.09, 0.12, 0.18, 0.24]

[search.gate_threshold]
threshold_candidates = [0.70, 0.75, 0.80, 0.85, 0.90, 0.95, 0.975, 0.99]
include_disabled_candidate = true

[execution]
tp_pct = 0.045
sl_pct = 0.03
max_hold_bars = 96
entry_shift_bars = 0

[compute]
runs_root = "artifacts/pump_end_v2"